<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <!-- THE STEALTH CLOAK: Blocks all search engines from finding this page -->
    <meta name="robots" content="noindex, nofollow, noarchive">
    <title>Encrypted Vault</title>

    <style>
        :root { --bg-main: #050806; --card-bg: #0c1410; --text-main: #e2e8f0; --text-light: #64748b; --neon-green: #00ff66; --border-dark: #1f3b28; --input-bg: #030504; --focus-glow: rgba(0, 255, 102, 0.2); --btn-glow: rgba(0, 255, 102, 0.4); }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: radial-gradient(circle at top, #0d1a12 0%, var(--bg-main) 100%); color: var(--text-main); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .card { background: var(--card-bg); padding: 40px; border-radius: 16px; border: 1px solid var(--border-dark); box-shadow: 0 0 30px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,255,102,0.02); width: 100%; max-width: 500px; }
        .header { margin-bottom: 30px; border-bottom: 1px solid var(--border-dark); padding-bottom: 20px; }
        .title-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
        h2 { margin: 0; font-size: 26px; color: var(--text-main); font-weight: 700; letter-spacing: 1px; }
        .badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(0, 255, 102, 0.1); color: var(--neon-green); border: 1px solid rgba(0, 255, 102, 0.3); padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 700; text-transform: uppercase; }
        .badge svg { width: 14px; height: 14px; }
        p.subtitle { margin: 0; color: var(--text-light); font-size: 14px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 13px; color: #a7f3d0; text-transform: uppercase; letter-spacing: 0.5px; }
        .input-wrapper { position: relative; margin-top: 8px; }
        input { width: 100%; padding: 14px 48px 14px 16px; background: var(--input-bg); border: 1px solid var(--border-dark); border-radius: 8px; color: var(--neon-green); box-sizing: border-box; font-size: 15px; transition: all 0.3s; font-family: monospace; }
        input:focus { border-color: var(--neon-green); outline: none; box-shadow: 0 0 15px var(--focus-glow); }
        .toggle-btn { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-light); cursor: pointer; padding: 4px; transition: color 0.2s; }
        .toggle-btn:hover, .toggle-btn.active { color: var(--neon-green); }
        button.primary-btn { width: 100%; padding: 18px; margin-top: 10px; background: #000; border: 1px solid var(--neon-green); border-radius: 8px; color: var(--neon-green); font-weight: 700; cursor: pointer; font-size: 16px; text-transform: uppercase; letter-spacing: 2px; transition: all 0.2s; box-shadow: 0 0 15px var(--btn-glow), inset 0 0 10px rgba(0,255,102,0.1); }
        button.primary-btn:hover { background: var(--neon-green); color: #000; box-shadow: 0 0 25px var(--btn-glow); }
        .output-box { margin-top: 25px; background: #030504; padding: 20px; border-radius: 8px; border: 1px solid var(--neon-green); color: var(--neon-green); white-space: pre-wrap; word-break: break-all; line-height: 1.6; font-family: monospace; font-size: 14px; position: relative; box-shadow: inset 0 0 15px rgba(0,255,102,0.05); }
        .copy-btn { position: absolute; top: 12px; right: 12px; background: rgba(0,255,102,0.1); border: 1px solid var(--neon-green); color: var(--neon-green); padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; text-transform: uppercase; transition: all 0.2s; }
        .copy-btn:hover { background: var(--neon-green); color: #000; }
        .hidden { display: none; }
    </style>
</head>
<body>
<div class="card">
    <div class="header">

            <span class="badge">

                Encrypted Payload
            </span>
        </div>
        <p class="subtitle">Awaiting decryption sequence...</p>
    </div>
    
    
            <div class="form-group">
                <label>Master Key: 3 Memorable Words</label>
                <div class="input-wrapper">
                    <input type="password" id="words" placeholder="Separated by spaces" required>
                    <button type="button" class="toggle-btn" onclick="toggleVisibility('words', this)"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg></button>
                </div>
            </div>
            <div class="form-group">
                <label>Your First Love Name?</label>
                <div class="input-wrapper">
                    <input type="password" id="ans1" placeholder="Secret Answer" required>
                    <button type="button" class="toggle-btn" onclick="toggleVisibility('ans1', this)"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg></button>
                </div>
            </div>
            <div class="form-group">
                <label>Who Declare The Name Of My First Nephew &quot;Jaivik&quot;</label>
                <div class="input-wrapper">
                    <input type="password" id="ans2" placeholder="Secret Answer" required>
                    <button type="button" class="toggle-btn" onclick="toggleVisibility('ans2', this)"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg></button>
                </div>
            </div>
    
    <button class="primary-btn" onclick="decryptVault()">Decrypt Data</button>
    
    <div id="result-container" class="output-box hidden">
        <button class="copy-btn" onclick="copyDecrypted()">Copy</button>
        <div id="unlock-output"></div>
    </div>
</div>

<script>
    const ENCRYPTED_PAYLOAD = "1740bb14fe603f09195fb77c1f43ef8c5d30626b1907e5b551a544cfbf1c2f4662c977edbac38dda786204c642b83f58f8ad6b9a019169efd5ca332e1328d9b2281815d61148cf1fe3f49551de7090c1bcc62a86beaea24d3873d16fe724319030799c3fce6138ca8fcf6bf98de23e7004c671b2d14cf313864ae3472b71bd72b8dfb1b5e7f9d4d4b4e30edffacc453667b360f36d57acd99a3677ea845166c51f1912dcb6f577e9503d7f7ffb2c5e8a6b057e30fd8c1cba8e5e60cada31d24fd7da4dfe67d9050c27e208a628d82b09cd1cbaf12a1e1ba32e0c58a4f7e1173bbc5c6867b9ee4b8b467367af7daabf23e0257b797b5198f30667a283deafcb902cbb882c343a3b3af2041ab300c71b5fa6e12ef274d3c372959a45743600d54f717669383e676378eaba308b58e706c4b4fd00df78e1ca61cb37ffb451bb20188d4d36e06de82bfb17e318a30fe515525aaece8e2aaf448cceb8c4fe36fc1164be40afe48d2e49eccdb845d9dfd9fea790e2b8b40d07c4b32b74db1f21149713ebf108868106514cb853dd822292a4597d63aa71cc6ef90299a7ed3b0fd8ec21001925d901709369c6219cd449f846549850017a08538e7e8a85b97a6322d924b88738e5bf66636c11c31e1fda57bdb306773f20be81d68ffc684f43f31b0dada645b84f451fdc0060077972211e95bc6e40970423a98c9a1b0ede7ab3bcf7c9d09f02d709498d681f5df63a0b581455178724c41b6fab4fa0a6e3a56f9a5a0a76578016ba8acbea03d09b82d6183c4fa58bf4ddfa9dbb43cc777dbf57ed057433bb1339328191602f12f0f47c05f1d2be5ca3761c695e611a93771c66f0e915aaa41f8fa88b058626d76b7794bc689b3e79f1a2b67614a87d2d7da90cca90cf90533236e57d5b72ccc9c370f113fc9bf31f85d48ee6e936243c980d1bfc65a14e4143c556586812a9b8db0aa96ece425f63d1087955bbd1365f3b3a1dfe8151ea8c26d32e601e24320180f8d84bc5af24a8e3fa8e3d75be1318570b71ff59198c021b39fe85bbd1a34cd75a965323c84a0bf45aa92e8d6052865141afcaf10697fd73e392386bb437ecba2295fe74c542f4798a3daf83abd67336656a17da19db66eb2f8135ff11fe1696fdff043eb83944fef214a416f25269d3332ea8d55a1aa5de0ad7a220110240eb2cbf53b4003be67bb847e81cb4a19b42ba7fbc888a4136a9770c08643f343c58600e470225ff1872b2f037d971c3b3a39e93faa4760e23024390d78b9ae888ab1350f63bd3b0e5ac672eb7bcb772fc4e2e39c9dc127bcdd313d33f784f5789ca911797c95cb9bcc7b7d49ee6db9b01cb108738e98b94445b15fea615e1041c7234318397995703ee85cdf2760447f168e467b2434e637c51b0785e786a9243f69069027b2f255dab72d2966773ceeb9065acd2cbd4f5bf865d4df96933e0494fcad404ba5380acae3e349dc209172b5aad4a57fa4831e762b0463049f4fb1c53246cf07035c27889933a9b96b9bd4c2a1f66d9b0a3c36a0cc1e9ac1eec2fdcc758";
    const eyeOpenSVG = `<path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/>`;
    const eyeClosedSVG = `<path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" y1="2" x2="22" y2="22"/>`;

    function toggleVisibility(inputId, btn) {
        const input = document.getElementById(inputId);
        const svg = btn.querySelector('svg');
        if (input.type === "password") { input.type = "text"; svg.innerHTML = eyeClosedSVG; btn.classList.add('active'); } 
        else { input.type = "password"; svg.innerHTML = eyeOpenSVG; btn.classList.remove('active'); }
    }

    async function deriveKey(passphrase, salt) {
        const encoder = new TextEncoder();
        const baseKey = await crypto.subtle.importKey("raw", encoder.encode(passphrase), "PBKDF2", false, ["deriveKey"]);
        return crypto.subtle.deriveKey({ name: "PBKDF2", salt: salt, iterations: 100000, hash: "SHA-256" }, baseKey, { name: "AES-GCM", length: 256 }, false, ["decrypt"]);
    }

    async function decryptVault() {
        // Dynamically pull values based on what inputs exist
        const passParts = [];
        const wordsEl = document.getElementById('words');
        if(wordsEl && wordsEl.value.trim() === "") return alert("SYSTEM ERROR: Master Key is required.");
        if(wordsEl) passParts.push(wordsEl.value.trim().toLowerCase());

        const ans1El = document.getElementById('ans1');
        if(ans1El) {
            if(ans1El.value.trim() === "") return alert("SYSTEM ERROR: Question Alpha is required.");
            passParts.push(ans1El.value.trim().toLowerCase());
        }

        const ans2El = document.getElementById('ans2');
        if(ans2El) {
            if(ans2El.value.trim() === "") return alert("SYSTEM ERROR: Question Beta is required.");
            passParts.push(ans2El.value.trim().toLowerCase());
        }
        
        const passphrase = passParts.join('||');
        
        try {
            const rawData = new Uint8Array(ENCRYPTED_PAYLOAD.match(/.{1,2}/g).map(byte => parseInt(byte, 16)));
            const salt = rawData.slice(0, 16);
            const iv = rawData.slice(16, 28);
            const ciphertext = rawData.slice(28);

            const key = await deriveKey(passphrase, salt);
            const decrypted = await crypto.subtle.decrypt({ name: "AES-GCM", iv: iv }, key, ciphertext);
            
            const decoder = new TextDecoder();
            document.getElementById('unlock-output').textContent = decoder.decode(decrypted);
            document.getElementById('result-container').classList.remove('hidden');
        } catch (e) {
            alert("DECRYPTION FAILED. Invalid credentials. Access denied.");
        }
    }

    function copyDecrypted() {
        const textToCopy = document.getElementById('unlock-output').innerText;
        navigator.clipboard.writeText(textToCopy).then(() => {
            const btn = document.querySelector('.copy-btn');
            btn.innerText = "COPIED!";
            setTimeout(() => btn.innerText = "COPY", 2000);
        }).catch(() => {
            // Fallback for older browsers / iframe restrictions
            const textArea = document.createElement("textarea");
            textArea.value = textToCopy;
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand("Copy");
            textArea.remove();
            const btn = document.querySelector('.copy-btn');
            btn.innerText = "COPIED!";
            setTimeout(() => btn.innerText = "COPY", 2000);
        });
    }
</script>
</body>
</html>
